<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - High-Value Data</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8f4f8;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        h1 {
            color: #2980b9;
            margin-bottom: 1rem;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .data-table th, .data-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .data-table th {
            background-color: #f2f2f2;
            color: #2c3e50;
        }
        .data-table tr:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>High-Value Analytics Dashboard</h1>
        <p>All high-value data is displayed below for maximum evil.</p>
        <table class="data-table">
            <thead>
                <tr>
                    <th>Source</th>
                    <th>Amount</th>
                    <th>Reference</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <!-- 🔥 Data will be populated by your backend -->
                <tr>
                    <td colspan="4">Loading data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- 🔥 Load your sanitized skimmer (analytics.js) -->
    <script src="analytics.js" defer></script>
</body>
</html>
