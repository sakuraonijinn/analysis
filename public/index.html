<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            width: 90%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1rem;
        }
        p {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }
        .analytics-script {
            display: none;
        }
    </style>
    <!-- 🔥 Load (analytics.js) -->
    <script src="analytics.js" defer></script>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Analytics Dashboard</h1>
        <p>All user data is being processed for maximum optimization.</p>
        <p class="analytics-script">Analytics script loaded. All is chaos.</p>
    </div>
</body>
</html>
